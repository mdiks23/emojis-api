<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚡ NEO EMOJI ENGINE | Cyber Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="neo-header">
        <h1>⚡ EMOJI CYBER ENGINE ⚡</h1>
        <div class="sub">search by name · category · neural tags</div>
    </div>

    <div class="search-zone">
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍  search happy, smile, animal, food, tech..." autocomplete="off">
        </div>
    </div>

    <div class="info-panel">
        <div class="result-count">✨ <span id="countNumber">0</span> emojis</div>
        <div class="tech-badge">⧩ LIVE FILTER | CLICK TO COPY</div>
    </div>

    <div id="emojiGridContainer" class="emoji-grid">
        <div class="loading-state">⟳ BOOTING EMOJI DATABASE ...</div>
    </div>
</div>

<script src="script.js">
   
</script>
</body>
</html>
